<!-- 首页内容区 -->
<th:block th:fragment="main-content"
  th:with="githubUsername = ${theme.config.about_settings.github.username},
                   profile = ${theme.config.about_settings.profile},
                   indexCfg = ${theme.config.index},
                   contentSettings = ${indexCfg.content_settings},
                   postSettings = ${indexCfg.post_settings},
                   friendsSettings = ${indexCfg.friends_settings},
                   momentsSettings = ${indexCfg.moments_settings},
                   sidebarCfg = ${indexCfg.sidebar_settings},
                   hasFriendsPlugin = ${pluginFinder.available('plugin-friends')},
                   hasMomentsPlugin = ${pluginFinder.available('PluginMoments')},
                   showFriendsTab = ${hasFriendsPlugin and friendsSettings.show_friends_tab != false},
                   showMomentsTab = ${hasMomentsPlugin and momentsSettings.show_moments_tab != false},
                   showPostsTab = ${postSettings.show_posts != false},
                   showSidebar = ${sidebarCfg?.show_sidebar != false},
                   showHeatmap = ${contentSettings.show_heatmap != false},
                   heatmapType = ${contentSettings.heatmap_type ?: 'github'},
                   tabStyle = ${contentSettings.tab_style ?: 'chips'},
                   tabsOrder = ${contentSettings.tabs_order ?: {'posts', 'friends', 'moments'}},
                   listStyle = ${postSettings.list_style ?: 'magazine'},
                   postCount = ${postSettings.post_count ?: 8},
                   friendsCount = ${friendsSettings.friends_count ?: 10},
                   friendsListStyle = ${friendsSettings.list_style ?: 'two_columns'},
                   momentsCount = ${momentsSettings.moments_count ?: 6},
                   momentsListStyle = ${momentsSettings.list_style ?: 'two_columns'},
                   globalSidebarCfg = ${theme.config.general.sidebar_settings},
                   useCustomSidebar = ${sidebarCfg?.enable_custom_sidebar == true},
                   sidebarPosition = ${useCustomSidebar ? (sidebarCfg?.sidebar_position ?: 'right') : (globalSidebarCfg?.position ?: 'right')}">

  <div
    th:class="${theme.config.index.background_settings?.enable_header != false} ? 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-20 pb-8 lg:pt-24 lg:pb-12' : 'max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-8 lg:pt-8 lg:pb-12'">

    <!-- 主内容区：内容 + 侧边栏 -->
    <div class="flex gap-8 lazy-anim" th:classappend="${sidebarPosition == 'left'} ? 'flex-row-reverse' : ''">
      <!-- 左侧：热力图 + Tab切换 + 文章列表 -->
      <section class="flex-1 min-w-0 flex flex-col gap-6 lg:gap-8">
        <!-- 默认排版流 (兼容老配置) -->
        <th:block th:unless="${theme.config.index.index_layout?.enabled}">
          <th:block th:insert="~{modules/widgets/heatmap :: heatmap(context='main')}" />
          <th:block th:insert="~{modules/widgets/docs :: docs(context='main')}" />
          <th:block th:insert="~{modules/widgets/tabs_group :: tabs_group(context='main')}" />
        </th:block>

        <!-- 自由排序排版流 -->
        <th:block th:if="${theme.config.index.index_layout?.enabled}">
          <th:block th:each="module : ${theme.config.index.index_layout.modules}">
            <th:block th:switch="${module.id}">
              <th:block th:case="'heatmap'" th:insert="~{modules/widgets/heatmap :: heatmap(context='main')}" />
              <th:block th:case="'docs'" th:insert="~{modules/widgets/docs :: docs(context='main')}" />
              <th:block th:case="'tabs_group'"
                th:insert="~{modules/widgets/tabs_group :: tabs_group(context='main')}" />
              <th:block th:case="'gallery'" th:insert="~{modules/widgets/gallery :: gallery(context='main')}" />
              <th:block th:case="'links'" th:insert="~{modules/widgets/links :: links(context='main')}" />
            </th:block>
          </th:block>
        </th:block>
      </section>

      <!-- 右侧：侧边栏 -->
      <aside th:if="${showSidebar}" class="w-80 shrink-0 space-y-6 hidden lg:block sticky top-20 self-start">
        <!-- 动态小工具 -->
        <th:block th:replace="~{modules/widgets/sidebar :: dynamic(${sidebarCfg})}" />
      </aside>
    </div>

    <!-- ========== 首页扩展模块区域 ========== -->

    <!-- 默认底宽模块 (兼容老配置) -->
    <th:block th:unless="${theme.config.index.index_layout?.enabled}">
      <!-- 图库模块 -->
      <div class="mt-10 lg:mt-16">
        <th:block th:insert="~{modules/widgets/gallery :: gallery(context='main')}" />
      </div>

      <!-- 友情链接模块 -->
      <div class="mt-10 lg:mt-16">
        <th:block th:insert="~{modules/widgets/links :: links(context='main')}" />
      </div>
    </th:block>




  </div>


</th:block>
