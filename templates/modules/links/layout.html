<!doctype html>
<html lang="zh-CN" th:fragment="html (content)">
  <!-- ========================================== -->
  <!--        友情链接页面布局                     -->
  <!-- 路由：/links                               -->
  <!-- ========================================== -->

  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 启用 View Transitions API (Safari 18+/Chrome 111+) -->
    <meta name="view-transition" content="same-origin" />

    <!-- 防止主题闪烁 -->
    <th:block th:replace="~{modules/theme-script :: inline-script}" />

    <!-- 页面标题 -->
    <title
      th:text="'友情链接 - ' + ${site.title} + (${site.subtitle != null and !#strings.isEmpty(site.subtitle)} ? ' - ' + ${site.subtitle} : '')"
    >
    </title>
    <!-- 字体 -->
    <th:block th:replace="~{modules/font-loader :: fonts}" />
    <!-- 主题样式 -->
    <link rel="stylesheet" th:href="@{/assets/css/main.css?v={version}(version=${theme.spec.version})}" />
    <link rel="stylesheet" th:href="@{/assets/css/links.css?v={version}(version=${theme.spec.version})}" />
    <!-- 音乐播放器 CSS -->
    <th:block th:replace="~{modules/music-player :: head}" />
  </head>

  <body
    th:with="bgConfig = ${theme.config.general.global_background},
                 enableCustomBg = ${bgConfig?.enable_custom == true},
                 bgStyle = ${bgConfig?.background_style ?: 'base-200'},
                 bgClass = ${enableCustomBg ? (bgStyle == 'grid' ? 'bg-base-100' : 'bg-' + bgStyle) : 'bg-base-200'}"
    th:class="'min-h-screen text-base-content relative ' + ${bgClass}"
  >
    <!-- 网格背景（仅当选择 grid 样式时显示） -->
    <div
      th:if="${enableCustomBg and bgStyle == 'grid'}"
      class="bg-grid-pattern pointer-events-none fixed inset-0 z-[1]"
    ></div>

    <div class="relative z-10">
      <!-- 加载屏幕 -->
      <th:block th:replace="~{modules/loading-screen :: loading-screen}" />

      <!-- 导航栏 -->
      <th:block th:replace="~{modules/nav :: navbar}" />

      <!-- 主要内容区域 -->
      <main id="swup" class="mt-6 flex-1 md:mt-8">
        <th:block th:replace="${content}" />
      </main>

      <!-- 页脚 -->
      <th:block th:replace="~{modules/footer :: footer}" />
    </div>

    <div id="swup-page-extras">
      <!-- 悬浮 Dock 控制栏 -->
      <th:block th:replace="~{modules/floating-dock :: dockWithConfig(${theme.config.links_settings}, 'comment')}" />
    </div>

    <!-- JavaScript -->
    <div id="swup-scripts" hidden>
      <script
        type="module"
        th:src="@{/assets/js/links.js?v={version}(version=${theme.spec.version})}"
        data-swup-reload-script
      ></script>
    </div>
    <script type="module" th:src="@{/assets/js/main.js?v={version}(version=${theme.spec.version})}"></script>
    <!-- 悬浮音乐播放器 -->
    <th:block th:replace="~{modules/music-player :: player}" />
  </body>
</html>
