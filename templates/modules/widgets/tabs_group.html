<th:block th:fragment="tabs_group(context)">
  <th:block th:with="
            tabsList = ${tabsOrder.![#this instanceof T(java.lang.String) ? #this : #this.tab]},
            tab0 = ${tabsList[0]},
            tab1 = ${tabsList[1]},
            tab2 = ${tabsList[2]},
            isTab0Enabled = ${(tab0 == 'posts' and showPostsTab) or (tab0 == 'friends' and showFriendsTab) or (tab0 == 'moments' and showMomentsTab)},
            isTab1Enabled = ${(tab1 == 'posts' and showPostsTab) or (tab1 == 'friends' and showFriendsTab) or (tab1 == 'moments' and showMomentsTab)},
            firstEnabledTab = ${isTab0Enabled ? tab0 : (isTab1Enabled ? tab1 : tab2)},
            defaultTab = ${firstEnabledTab == 'posts' ? 'site' : firstEnabledTab}">
    <div x-data th:attr="x-data=|{ tab: '${defaultTab}' }|">
      <!-- Tab 切换块 -->
      <th:block th:switch="${tabStyle}">
        <!-- 药丸风格 - 胶囊徽章 -->
        <th:block th:case="'pills'">
          <div class="mb-8">
            <div class="flex flex-wrap items-center gap-2">
              <th:block th:each="tabCode : ${tabsList}">
                <!-- 全部文章 -->
                <button th:if="${tabCode == 'posts' and showPostsTab}" @click="tab = 'site'"
                  :class="tab === 'site' ? 'bg-base-100 text-base-content shadow-sm border-base-content/10' : 'bg-base-100/60 text-base-content/60 border-base-content/5 hover:bg-base-100 hover:text-base-content hover:shadow-sm hover:border-base-content/10'"
                  class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-medium border transition-all duration-200 cursor-pointer">
                  <span class="icon-[heroicons--home] w-3.5 h-3.5"></span>
                  全部文章
                </button>
                <!-- 朋友动态 -->
                <button th:if="${tabCode == 'friends' and showFriendsTab}" @click="tab = 'friends'"
                  :class="tab === 'friends' ? 'bg-base-100 text-base-content shadow-sm border-base-content/10' : 'bg-base-100/60 text-base-content/60 border-base-content/5 hover:bg-base-100 hover:text-base-content hover:shadow-sm hover:border-base-content/10'"
                  class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-medium border transition-all duration-200 cursor-pointer">
                  <span class="icon-[heroicons--users] w-3.5 h-3.5"></span>
                  朋友动态
                </button>
                <!-- 瞬间说说 -->
                <button th:if="${tabCode == 'moments' and showMomentsTab}" @click="tab = 'moments'"
                  :class="tab === 'moments' ? 'bg-base-100 text-base-content shadow-sm border-base-content/10' : 'bg-base-100/60 text-base-content/60 border-base-content/5 hover:bg-base-100 hover:text-base-content hover:shadow-sm hover:border-base-content/10'"
                  class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-medium border transition-all duration-200 cursor-pointer">
                  <span class="icon-[heroicons--chat-bubble-left-ellipsis] w-3.5 h-3.5"></span>
                  瞬间说说
                </button>
              </th:block>
            </div>
          </div>
        </th:block>
        <!-- 芯片风格 - iOS Style with Icons -->
        <th:block th:case="'chips'">
          <div class="mb-8">
            <div
              class="inline-flex p-1 bg-base-200/50 backdrop-blur-sm rounded-xl border border-base-content/10 dark:bg-base-300/40 dark:border-base-content/10">
              <th:block th:each="tabCode : ${tabsList}">
                <!-- 全部文章 -->
                <button th:if="${tabCode == 'posts' and showPostsTab}" @click="tab = 'site'"
                  :class="tab === 'site' ? 'bg-base-100 shadow-md text-base-content dark:bg-base-100/95' : 'text-base-content/60 hover:text-base-content hover:bg-base-100/40'"
                  class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200">
                  <span class="icon-[heroicons--squares-2x2] w-4 h-4"></span>全部文章</button>
                <!-- 朋友动态 -->
                <button th:if="${tabCode == 'friends' and showFriendsTab}" @click="tab = 'friends'"
                  :class="tab === 'friends' ? 'bg-base-100 shadow-md text-base-content dark:bg-base-100/95' : 'text-base-content/60 hover:text-base-content hover:bg-base-100/40'"
                  class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200">
                  <span class="icon-[heroicons--users] w-4 h-4"></span>朋友动态</button>
                <!-- 瞬间说说 -->
                <button th:if="${tabCode == 'moments' and showMomentsTab}" @click="tab = 'moments'"
                  :class="tab === 'moments' ? 'bg-base-100 shadow-md text-base-content dark:bg-base-100/95' : 'text-base-content/60 hover:text-base-content hover:bg-base-100/40'"
                  class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200">
                  <span class="icon-[heroicons--chat-bubble-left-ellipsis] w-4 h-4"></span>瞬间说说</button>
              </th:block>
            </div>
          </div>
        </th:block>
        <!-- 下划线风格 -->
        <th:block th:case="'underline'">
          <div class="mb-8 border-b border-base-200">
            <div class="flex flex-wrap items-center gap-1 -mb-px">
              <th:block th:each="tabCode : ${tabsList}">
                <!-- 全部文章 -->
                <button th:if="${tabCode == 'posts' and showPostsTab}" @click="tab = 'site'"
                  :class="tab === 'site' ? 'text-primary' : 'text-base-content/60 hover:text-base-content'"
                  class="relative px-4 py-3 text-sm font-medium transition-colors duration-200">
                  全部文章
                  <span x-show="tab === 'site'"
                    class="absolute bottom-0 left-0 right-0 h-0.5 bg-primary rounded-full"></span>
                </button>
                <!-- 朋友动态 -->
                <button th:if="${tabCode == 'friends' and showFriendsTab}" @click="tab = 'friends'"
                  :class="tab === 'friends' ? 'text-primary' : 'text-base-content/60 hover:text-base-content'"
                  class="relative px-4 py-3 text-sm font-medium transition-colors duration-200">
                  朋友动态
                  <span x-show="tab === 'friends'"
                    class="absolute bottom-0 left-0 right-0 h-0.5 bg-primary rounded-full"></span>
                </button>
                <!-- 瞬间说说 -->
                <button th:if="${tabCode == 'moments' and showMomentsTab}" @click="tab = 'moments'"
                  :class="tab === 'moments' ? 'text-primary' : 'text-base-content/60 hover:text-base-content'"
                  class="relative px-4 py-3 text-sm font-medium transition-colors duration-200">
                  瞬间说说
                  <span x-show="tab === 'moments'"
                    class="absolute bottom-0 left-0 right-0 h-0.5 bg-primary rounded-full"></span>
                </button>
              </th:block>
            </div>
          </div>
        </th:block>
        <!-- 玻璃拟态风格 -->
        <th:block th:case="'glass'">
          <div class="mb-8">
            <div class="flex flex-wrap items-center gap-2">
              <th:block th:each="tabCode : ${tabsList}">
                <button th:if="${tabCode == 'posts' and showPostsTab}" @click="tab = 'site'"
                  :class="tab === 'site' ? 'bg-base-100/90 text-base-content shadow-md dark:bg-base-100/95' : 'text-base-content/60 hover:bg-base-100/50 hover:text-base-content'"
                  class="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300">全部文章</button>
                <button th:if="${tabCode == 'friends' and showFriendsTab}" @click="tab = 'friends'"
                  :class="tab === 'friends' ? 'bg-base-100/90 text-base-content shadow-md dark:bg-base-100/95' : 'text-base-content/60 hover:bg-base-100/50 hover:text-base-content'"
                  class="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300">朋友动态</button>
                <button th:if="${tabCode == 'moments' and showMomentsTab}" @click="tab = 'moments'"
                  :class="tab === 'moments' ? 'bg-base-100/90 text-base-content shadow-md dark:bg-base-100/95' : 'text-base-content/60 hover:bg-base-100/50 hover:text-base-content'"
                  class="px-4 py-2 rounded-xl text-sm font-medium transition-all duration-300">瞬间说说</button>
              </th:block>
            </div>
          </div>
        </th:block>
        <!-- 默认药丸风格 -->
        <th:block th:case="*">
          <div class="mb-8">
            <div class="flex flex-wrap items-center gap-3">
              <th:block th:each="tabCode : ${tabsList}">
                <button th:if="${tabCode == 'posts' and showPostsTab}" @click="tab = 'site'"
                  :class="tab === 'site' ? 'bg-primary text-primary-content shadow-lg shadow-primary/30' : 'bg-base-200/80 text-base-content/70 hover:bg-base-300 hover:text-base-content hover:shadow-md'"
                  class="px-5 py-2 rounded-full text-sm font-medium transition-all duration-300">全部文章</button>
                <button th:if="${tabCode == 'friends' and showFriendsTab}" @click="tab = 'friends'"
                  :class="tab === 'friends' ? 'bg-primary text-primary-content shadow-lg shadow-primary/30' : 'bg-base-200/80 text-base-content/70 hover:bg-base-300 hover:text-base-content hover:shadow-md'"
                  class="px-5 py-2 rounded-full text-sm font-medium transition-all duration-300">朋友动态</button>
                <button th:if="${tabCode == 'moments' and showMomentsTab}" @click="tab = 'moments'"
                  :class="tab === 'moments' ? 'bg-primary text-primary-content shadow-lg shadow-primary/30' : 'bg-base-200/80 text-base-content/70 hover:bg-base-300 hover:text-base-content hover:shadow-md'"
                  class="px-5 py-2 rounded-full text-sm font-medium transition-all duration-300">瞬间说说</button>
              </th:block>
            </div>
          </div>
        </th:block>
      </th:block>

      <!-- 全部文章 -->
      <th:block th:if="${showPostsTab}">
        <div x-show="tab === 'site'" th:with="sitePosts = ${postFinder.list({page: 1, size: postCount})}">


          <th:block th:switch="${listStyle}">
            <th:block th:case="'modern'">
              <th:block th:replace="~{modules/categories/list-modern :: modern(${sitePosts}, ${postSettings})}" />
            </th:block>
            <th:block th:case="'media_text'">
              <th:block th:replace="~{modules/categories/list-media :: media_text(${sitePosts}, ${postSettings})}" />
            </th:block>
            <th:block th:case="'magazine'">
              <th:block th:replace="~{modules/categories/list-magazine :: magazine(${sitePosts}, ${postSettings})}" />
            </th:block>
            <th:block th:case="'minimal'">
              <th:block th:replace="~{modules/categories/list-minimal :: minimal(${sitePosts}, ${postSettings})}" />
            </th:block>
            <th:block th:case="*">
              <th:block th:replace="~{modules/categories/list-modern :: modern(${sitePosts}, ${postSettings})}" />
            </th:block>
          </th:block>
          <div class="mt-10 text-center">
            <a href="/archives"
              class="group inline-flex items-center gap-1.5 text-sm font-medium text-base-content/50 hover:text-primary transition-colors duration-300">
              View All
              <span
                class="icon-[heroicons--arrow-right] w-4 h-4 group-hover:translate-x-1 transition-transform duration-300"></span>
            </a>
          </div>
        </div>
      </th:block>

      <!-- 朋友动态 -->
      <th:block th:if="${showFriendsTab and friendFinder != null}">
        <div x-show="tab === 'friends'" x-cloak th:with="friendPosts = ${friendFinder.list({page: 1, size: friendsCount})},
                       linkGroups = ${linkFinder.groupBy()}">

          <!-- 两列样式 - Bento Grid Style -->
          <div th:if="${friendsListStyle == 'two_columns'}" class="grid grid-cols-1 gap-6 md:grid-cols-2">
            <th:block th:each="friend : ${friendPosts.items}" th:with="spec = ${friend.spec}">
              <article
                class="card group relative bg-base-100/80 backdrop-blur-xl border border-base-content/5 shadow-lg rounded-[1.5rem] p-5 hover:shadow-2xl hover:scale-[1.01] hover:bg-base-100 transition-all duration-300 cursor-pointer overflow-hidden">

                <!-- 顶部元信息 -->
                <div class="flex items-center gap-3 mb-4">
                  <div class="relative">
                    <img th:src="${spec.logo}" th:alt="${spec.author}"
                      class="w-10 h-10 rounded-xl object-cover ring-2 ring-base-content/10 group-hover:ring-primary/50 transition-all"
                      loading="lazy" />
                    <div
                      class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-base-100 flex items-center justify-center">
                      <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
                    </div>
                  </div>
                  <div class="flex-1 min-w-0">
                    <a th:href="${spec.authorUrl}" target="_blank"
                      class="text-sm font-bold text-base-content truncate block" th:text="${spec.author}">作者</a>
                    <div class="flex items-center gap-1.5 text-xs text-base-content/40">
                      <span th:text="${#temporals.format(spec.pubDate, 'MM-dd HH:mm')}">时间</span>
                      <!-- 动态匹配分组 -->
                      <th:block th:each="group : ${linkGroups}">
                        <th:block th:each="link : ${group.links}">
                          <th:block
                            th:if="${link.spec.url == spec.authorUrl || link.spec.url == spec.authorUrl + '/' || spec.authorUrl == link.spec.url + '/'}">
                            <span>·</span>
                            <span th:text="${group.spec.displayName}">分组</span>
                          </th:block>
                        </th:block>
                      </th:block>
                    </div>
                  </div>
                </div>

                <!-- 内容区域 -->
                <div class="relative z-10">
                  <h3 class="text-base font-bold text-base-content leading-snug mb-2 line-clamp-2">
                    <a th:href="${spec.postLink}" target="_blank" th:text="${spec.title}">标题</a>
                  </h3>
                  <p th:if="${spec.description != null and !spec.description.isEmpty()}"
                    class="text-sm text-base-content/60 line-clamp-2 leading-relaxed mb-4"
                    th:text="${spec.description}">描述...</p>

                  <!-- 底部链接 -->
                  <a th:href="${spec.postLink}" target="_blank"
                    class="inline-flex items-center gap-1.5 text-xs font-semibold text-base-content/40 group-hover:text-primary transition-colors">
                    阅读原文
                    <span
                      class="icon-[heroicons--arrow-right] w-3 h-3 group-hover:translate-x-0.5 transition-transform"></span>
                  </a>
                </div>
              </article>
            </th:block>
          </div>

          <!-- 单列样式 - Bento List Style -->
          <div th:if="${friendsListStyle == 'single_column'}" class="space-y-4">
            <th:block th:each="friend : ${friendPosts.items}" th:with="spec = ${friend.spec}">
              <article
                class="card group bg-base-100/80 backdrop-blur-xl border border-base-content/5 shadow-lg rounded-[1.5rem] p-5 hover:shadow-xl hover:bg-base-100 transition-all duration-300">
                <div class="flex items-start gap-4">
                  <!-- 左侧头像 -->
                  <a th:href="${spec.authorUrl}" target="_blank" rel="noopener" class="shrink-0 relative top-1">
                    <img th:src="${spec.logo}" th:alt="|${spec.author} 头像|"
                      class="w-12 h-12 rounded-xl object-cover ring-2 ring-base-content/10 group-hover:ring-primary/50 transition-all"
                      loading="lazy" />
                  </a>

                  <!-- 右侧内容 -->
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1">
                      <div class="flex items-center gap-2">
                        <a th:href="${spec.authorUrl}" target="_blank" rel="noopener"
                          class="text-sm font-bold text-base-content" th:text="${spec.author}">作者</a>
                        <!-- 动态匹配分组 (单列) -->
                        <th:block th:each="group : ${linkGroups}">
                          <th:block th:each="link : ${group.links}">
                            <th:block
                              th:if="${link.spec.url == spec.authorUrl || link.spec.url == spec.authorUrl + '/' || spec.authorUrl == link.spec.url + '/'}">
                              <span class="text-[10px] bg-base-200/50 px-1.5 py-0.5 rounded text-base-content/40"
                                th:text="${group.spec.displayName}">分组</span>
                            </th:block>
                          </th:block>
                        </th:block>
                      </div>
                      <time class="text-xs text-base-content/40 font-medium"
                        th:text="${#temporals.format(spec.pubDate, 'yyyy-MM-dd')}">2023-01-01</time>
                    </div>

                    <h3 class="text-base font-bold text-base-content mb-1.5 line-clamp-1">
                      <a th:href="${spec.postLink}" target="_blank" rel="noopener" th:text="${spec.title}">文章标题</a>
                    </h3>

                    <p th:if="${spec.description != null and !spec.description.isEmpty()}"
                      class="text-sm text-base-content/50 line-clamp-2 leading-relaxed" th:text="${spec.description}">
                      文章描述</p>
                  </div>
                </div>
              </article>
            </th:block>
          </div>


          <div th:if="${friendPosts.items == null or friendPosts.items.isEmpty()}"
            class="py-16 text-center text-base-content/40 text-sm">
            暂无朋友动态
          </div>
          <div th:if="${friendPosts.items != null and !friendPosts.items.isEmpty()}" class="mt-10 text-center">
            <a href="/friends"
              class="group inline-flex items-center gap-1.5 text-sm font-medium text-base-content/50 hover:text-primary transition-colors duration-300">
              View All
              <span
                class="icon-[heroicons--arrow-right] w-4 h-4 group-hover:translate-x-1 transition-transform duration-300"></span>
            </a>
          </div>
        </div>
      </th:block>

      <!-- 瞬间说说 -->
      <th:block th:if="${showMomentsTab and momentFinder != null}">
        <div x-show="tab === 'moments'" x-cloak th:with="momentsResult = ${momentFinder.list(1, momentsCount)},
                          momentsList = ${momentsResult.items}">

          <!-- 两列样式 (瀑布流) -->
          <div th:if="${momentsListStyle == 'two_columns'}" class="columns-1 md:columns-2 gap-6 [column-fill:_balance]">
            <th:block th:each="moment : ${momentsList}">
              <article th:with="content = ${moment.spec.content}"
                class="card group relative bg-base-100/80 backdrop-blur-xl border border-base-content/5 shadow-lg rounded-[1.5rem] overflow-hidden hover:shadow-2xl hover:bg-base-100 transition-all duration-300 cursor-pointer break-inside-avoid mb-6">

                <!-- 头部信息 -->
                <div class="p-5 pb-3">
                  <div class="flex items-center gap-3 mb-3">
                    <div class="relative">
                      <a th:href="@{/authors/{name}(name=${moment.owner.name})}" class="block group/avatar"
                        th:if="${moment.owner != null}">
                        <img th:if="${moment.owner.avatar != null}" th:src="${moment.owner.avatar}"
                          th:alt="|${moment.owner.displayName} 头像|"
                          class="w-10 h-10 rounded-xl object-cover ring-2 ring-base-content/10 group-hover/avatar:ring-primary/50 transition-all"
                          loading="lazy" />
                        <div th:unless="${moment.owner.avatar != null}"
                          class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary/20 to-accent/20 flex items-center justify-center">
                          <span class="icon-[heroicons--user] w-5 h-5 text-primary/60"></span>
                        </div>
                      </a>
                      <div th:if="${moment.owner == null}"
                        class="w-10 h-10 rounded-xl bg-base-200 flex items-center justify-center">
                        <span class="icon-[heroicons--user] w-5 h-5 text-base-content/40"></span>
                      </div>
                      <!-- 在线状态点 -->
                      <div
                        class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-base-100 flex items-center justify-center">
                        <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
                      </div>
                    </div>
                    <div class="flex-1 min-w-0">
                      <a th:if="${moment.owner != null}" th:href="@{/authors/{name}(name=${moment.owner.name})}"
                        class="text-sm font-bold text-base-content block truncate hover:text-primary transition-colors"
                        th:text="${moment.owner.displayName}">用户</a>
                      <span th:if="${moment.owner == null}"
                        class="text-sm font-bold text-base-content block truncate whitespace-nowrap">匿名用户</span>
                      <time class="text-xs text-base-content/40"
                        th:text="${#temporals.format(moment.spec.releaseTime, 'MM-dd HH:mm')}">01-01 12:00</time>
                    </div>
                  </div>

                  <!-- 文字内容 -->
                  <div th:if="${content.html != null and !#strings.isEmpty(content.html)}"
                    class="text-sm text-base-content/80 leading-relaxed line-clamp-4" th:utext="${content.html}">
                    内容...</div>
                </div>

                <!-- 媒体区域 -->
                <div th:if="${content.medium != null and !content.medium.isEmpty()}" class="px-5 pb-3">
                  <!-- 单图 -->
                  <th:block th:if="${#lists.size(content.medium) == 1}">
                    <th:block th:each="medium : ${content.medium}">
                      <div th:if="${medium.type.name == 'PHOTO'}" class="moment-single-img-wrap">
                        <img th:src="${medium.url}" alt="瞬间图片" class="max-h-72 object-cover bg-base-200"
                          loading="lazy" />
                      </div>
                      <!-- 视频播放器 (只有单视频为主) -->
                      <video th:if="${medium.type.name == 'VIDEO'}" th:src="${medium.url}" controls preload="metadata"
                        class="w-full rounded-xl max-h-72 object-cover">
                      </video>
                      <!-- 音频播放器 -->
                      <div th:if="${medium.type.name == 'AUDIO'}" class="bg-base-200 rounded-xl p-3">
                        <audio th:src="${medium.url}" controls preload="metadata" class="w-full h-10"></audio>
                      </div>
                    </th:block>
                  </th:block>

                  <!-- 多图网格 (动态排版 2-9图) -->
                  <div th:if="${#lists.size(content.medium) > 1}" class="grid gap-1 rounded-xl overflow-hidden"
                    th:classappend="${
                      #lists.size(content.medium) == 2 ? 'grid-cols-2 w-3/4' : 
                      #lists.size(content.medium) == 3 ? 'grid-cols-3' : 
                      #lists.size(content.medium) == 4 ? 'grid-cols-2 w-3/4' : 
                      #lists.size(content.medium) == 5 ? 'grid-cols-6' : 
                      #lists.size(content.medium) == 6 ? 'grid-cols-3' : 
                      #lists.size(content.medium) == 7 ? 'grid-cols-12' : 
                      #lists.size(content.medium) == 8 ? 'grid-cols-6' : 'grid-cols-3'
                    }">
                    <th:block th:each="medium, mStat : ${content.medium}">
                      <div th:if="${medium.type.name == 'PHOTO' && mStat.index < 9}" class="moment-grid-item"
                        th:classappend="${
                          #lists.size(content.medium) == 3 && mStat.index == 0 ? 'col-span-2 row-span-2 aspect-square' : 
                          #lists.size(content.medium) == 3 && mStat.index > 0 ? 'col-span-1 aspect-square' :
                          #lists.size(content.medium) == 5 && mStat.index < 2 ? 'col-span-3 aspect-[4/3]' : 
                          #lists.size(content.medium) == 5 && mStat.index >= 2 ? 'col-span-2 aspect-square' : 
                          #lists.size(content.medium) == 7 && mStat.index < 3 ? 'col-span-4 aspect-square' : 
                          #lists.size(content.medium) == 7 && mStat.index >= 3 ? 'col-span-3 aspect-square' : 
                          #lists.size(content.medium) == 8 && mStat.index < 2 ? 'col-span-3 aspect-[4/3]' : 
                          #lists.size(content.medium) == 8 && mStat.index >= 2 ? 'col-span-2 aspect-square' : 'aspect-square'
                        }">
                        <img th:src="${medium.url}" alt="瞬间图片" class="bg-base-200" loading="lazy" />
                        <div th:if="${mStat.index == 8 && #lists.size(content.medium) > 9}"
                          class="absolute inset-0 bg-black/50 flex items-center justify-center text-white"
                          style="z-index: 2;">
                          <span class="text-xl font-semibold"
                            th:text="'+' + (${#lists.size(content.medium)} - 9)">+3</span>
                        </div>
                      </div>
                    </th:block>
                  </div>
                </div>

                <!-- 互动信息 -->
                <div
                  class="px-5 py-3 border-t border-base-content/5 flex items-center justify-between text-xs text-base-content/40">
                  <div class="flex items-center gap-4">
                    <span class="flex items-center gap-1.5">
                      <span class="icon-[heroicons--heart] w-4 h-4"></span>
                      <span th:text="${moment.stats?.upvote ?: 0}">0</span>
                    </span>
                    <span class="flex items-center gap-1.5">
                      <span class="icon-[heroicons--chat-bubble-left] w-4 h-4"></span>
                      <span th:text="${moment.stats?.totalComment ?: 0}">0</span>
                    </span>
                  </div>
                  <a th:href="@{'/moments/' + ${moment.metadata.name}}"
                    class="flex items-center gap-1 text-primary hover:underline">
                    <span>查看详情</span>
                    <span class="icon-[heroicons--arrow-right] w-3.5 h-3.5"></span>
                  </a>
                </div>
              </article>
            </th:block>
          </div>

          <!-- 单列样式 -->
          <div th:if="${momentsListStyle == 'single_column'}" class="space-y-4">
            <th:block th:each="moment : ${momentsList}">
              <article th:with="content = ${moment.spec.content}"
                class="card group bg-base-100/80 backdrop-blur-xl border border-base-content/5 shadow-lg rounded-[1.5rem] overflow-hidden hover:shadow-xl hover:bg-base-100 transition-all duration-300">

                <div class="p-5">
                  <!-- 头部 -->
                  <div class="flex items-center gap-3 mb-4">
                    <div class="relative shrink-0">
                      <img th:if="${moment.owner?.avatar != null}" th:src="${moment.owner.avatar}"
                        th:alt="|${moment.owner.displayName} 头像|"
                        class="w-12 h-12 rounded-xl object-cover ring-2 ring-base-content/10 group-hover:ring-primary/50 transition-all"
                        loading="lazy" />
                      <div th:unless="${moment.owner?.avatar != null}"
                        class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary/20 to-accent/20 flex items-center justify-center">
                        <span class="icon-[heroicons--user] w-6 h-6 text-primary/60"></span>
                      </div>
                      <!-- 在线状态点 -->
                      <div
                        class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-base-100 flex items-center justify-center">
                        <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
                      </div>
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-base-content"
                          th:text="${moment.owner?.displayName ?: '匿名用户'}">用户</span>
                      </div>
                      <time class="text-xs text-base-content/40"
                        th:text="${#temporals.format(moment.spec.releaseTime, 'yyyy-MM-dd HH:mm')}">2024-01-01</time>
                    </div>
                  </div>

                  <!-- 内容 -->
                  <div th:if="${content.html != null and !#strings.isEmpty(content.html)}"
                    class="text-base text-base-content/80 leading-relaxed mb-4" th:utext="${content.html}">内容...
                  </div>

                  <!-- 媒体 -->
                  <div th:if="${content.medium != null and !content.medium.isEmpty()}" class="mb-4">
                    <!-- 单图 -->
                    <th:block th:if="${#lists.size(content.medium) == 1}">
                      <th:block th:each="medium : ${content.medium}">
                        <div th:if="${medium.type.name == 'PHOTO'}" class="moment-single-img-wrap">
                          <img th:src="${medium.url}" alt="瞬间图片" class="max-h-72 object-cover bg-base-200"
                            loading="lazy" />
                        </div>
                        <video th:if="${medium.type.name == 'VIDEO'}" th:src="${medium.url}" controls preload="metadata"
                          class="w-full rounded-xl max-h-72 object-cover">
                        </video>
                        <div th:if="${medium.type.name == 'AUDIO'}" class="bg-base-200 rounded-xl p-3">
                          <audio th:src="${medium.url}" controls preload="metadata" class="w-full h-10"></audio>
                        </div>
                      </th:block>
                    </th:block>

                    <!-- 多图网格 (动态排版 2-9图) -->
                    <div th:if="${#lists.size(content.medium) > 1}" class="grid gap-1 rounded-xl overflow-hidden"
                      th:classappend="${
                        #lists.size(content.medium) == 2 ? 'grid-cols-2 w-3/4' : 
                        #lists.size(content.medium) == 3 ? 'grid-cols-3' : 
                        #lists.size(content.medium) == 4 ? 'grid-cols-2 w-3/4' : 
                        #lists.size(content.medium) == 5 ? 'grid-cols-6' : 
                        #lists.size(content.medium) == 6 ? 'grid-cols-3' : 
                        #lists.size(content.medium) == 7 ? 'grid-cols-12' : 
                        #lists.size(content.medium) == 8 ? 'grid-cols-6' : 'grid-cols-3'
                      }">
                      <th:block th:each="medium, mStat : ${content.medium}">
                        <div th:if="${medium.type.name == 'PHOTO' && mStat.index < 9}" class="moment-grid-item"
                          th:classappend="${
                            #lists.size(content.medium) == 3 && mStat.index == 0 ? 'col-span-2 row-span-2 aspect-square' : 
                            #lists.size(content.medium) == 3 && mStat.index > 0 ? 'col-span-1 aspect-square' :
                            #lists.size(content.medium) == 5 && mStat.index < 2 ? 'col-span-3 aspect-[4/3]' : 
                            #lists.size(content.medium) == 5 && mStat.index >= 2 ? 'col-span-2 aspect-square' : 
                            #lists.size(content.medium) == 7 && mStat.index < 3 ? 'col-span-4 aspect-square' : 
                            #lists.size(content.medium) == 7 && mStat.index >= 3 ? 'col-span-3 aspect-square' : 
                            #lists.size(content.medium) == 8 && mStat.index < 2 ? 'col-span-3 aspect-[4/3]' : 
                            #lists.size(content.medium) == 8 && mStat.index >= 2 ? 'col-span-2 aspect-square' : 'aspect-square'
                          }">
                          <img th:src="${medium.url}" alt="瞬间图片" class="bg-base-200" loading="lazy" />
                          <div th:if="${mStat.index == 8 && #lists.size(content.medium) > 9}"
                            class="absolute inset-0 bg-black/50 flex items-center justify-center text-white"
                            style="z-index: 2;">
                            <span class="text-xl font-semibold"
                              th:text="'+' + (${#lists.size(content.medium)} - 9)">+3</span>
                          </div>
                        </div>
                      </th:block>
                    </div>
                  </div>

                  <!-- 互动 -->
                  <div class="flex items-center justify-between text-sm text-base-content/50">
                    <div class="flex items-center gap-4">
                      <span class="flex items-center gap-1.5">
                        <span class="icon-[heroicons--heart] w-4 h-4"></span>
                        <span th:text="${moment.stats?.upvote ?: 0}">0</span>
                      </span>
                      <span class="flex items-center gap-1.5">
                        <span class="icon-[heroicons--chat-bubble-left] w-4 h-4"></span>
                        <span th:text="${moment.stats?.totalComment ?: 0}">0</span>
                      </span>
                    </div>
                    <a th:href="@{'/moments/' + ${moment.metadata.name}}" class="text-primary hover:underline">查看详情
                      →</a>
                  </div>
                </div>
              </article>
            </th:block>
          </div>

          <div th:if="${momentsList == null or momentsList.isEmpty()}"
            class="py-16 text-center text-base-content/40 text-sm">
            暂无瞬间说说
          </div>
          <div th:if="${momentsList != null and !momentsList.isEmpty()}" class="mt-10 text-center">
            <a href="/moments"
              class="group inline-flex items-center gap-1.5 text-sm font-medium text-base-content/50 hover:text-primary transition-colors duration-300">
              View All
              <span
                class="icon-[heroicons--arrow-right] w-4 h-4 group-hover:translate-x-1 transition-transform duration-300"></span>
            </a>
          </div>
        </div>
      </th:block>
    </div>
  </th:block>
</th:block>
